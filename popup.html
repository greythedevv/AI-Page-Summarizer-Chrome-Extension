<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PageMind</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body class="dark-mode">

<!-- ╔══ HEADER ══════════════════════════════════════════════════════════════╗ -->
<header class="header" role="banner">
  <div class="logo" aria-label="PageMind">
    <div class="logo-mark" aria-hidden="true">
      <svg width="20" height="20" viewBox="0 0 22 22" fill="none">
        <path d="M11 2L13.5 8H20L14.5 12L17 18L11 14L5 18L7.5 12L2 8H8.5L11 2Z" fill="currentColor"/>
      </svg>
    </div>
    <span class="logo-name">PageMind</span>
  </div>
  <div class="header-right">
    <button class="icon-btn" id="themeBtn" aria-label="Switch to light mode" title="Light mode">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
  </div>
</header>

<!-- ╔══ PAGE INFO STRIP ══════════════════════════════════════════════════════╗ -->
<div class="page-strip" role="region" aria-label="Current page">
  <div class="page-favicon" id="pageFavicon" aria-hidden="true"></div>
  <div class="page-meta">
    <p class="page-title" id="pageTitle" title="">Loading…</p>
    <p class="page-domain" id="pageDomain"></p>
  </div>
  <span class="word-count-badge" id="wordCount" aria-live="polite"></span>
</div>

<!-- ╔══ MAIN CONTENT AREA ════════════════════════════════════════════════════╗ -->
<main class="main" id="mainPanel" role="main">

  <!-- ── Empty State ─────────────────────────────────────────────────────── -->
  <div class="state empty-state" id="emptyState" role="status">
    <div class="state-icon" aria-hidden="true">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
    </div>
    <p class="state-title">Ready to summarize</p>
    <p class="state-sub">Press <kbd>Ctrl</kbd>+<kbd>Enter</kbd> or click below</p>
  </div>

  <!-- ── Loading State ───────────────────────────────────────────────────── -->
  <div class="state loading-state hidden" id="loadingState" role="status" aria-live="polite">
    <div class="spinner" aria-hidden="true">
      <div class="spinner-ring"></div>
      <div class="spinner-dot"></div>
    </div>
    <p class="loading-text" id="loadingText">Extracting content…</p>
    <p class="loading-sub">This takes a few seconds</p>
  </div>

  <!-- ── Error State ─────────────────────────────────────────────────────── -->
  <div class="state error-state hidden" id="errorState" role="alert">
    <div class="error-icon" aria-hidden="true">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>
    <p class="error-title" id="errorTitle">Something went wrong</p>
    <p class="error-msg" id="errorMsg"></p>
    <button class="btn btn-ghost btn-sm" id="retryBtn">Try again</button>
  </div>

  <!-- ── Summary Panel ───────────────────────────────────────────────────── -->
  <div class="summary-panel hidden" id="summaryPanel" role="region" aria-label="Summary">

    <!-- Meta row -->
    <div class="meta-row" aria-label="Page metadata">
      <span class="chip time-chip" id="readingTimeChip" aria-label="Estimated reading time">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        <span id="readingTime">— min read</span>
      </span>

      <span class="chip sentiment-chip" id="sentimentChip" aria-label="Content sentiment">
        <span id="sentimentIcon" aria-hidden="true">○</span>
        <span id="sentimentLabel">—</span>
      </span>

      <span class="chip word-chip" id="wordCountChip" aria-label="Word count"></span>

      <span class="chip cache-chip hidden" id="cacheChip" aria-label="Loaded from cache">
        ⚡ cached
      </span>
    </div>

    <!-- Topics -->
    <div class="topics-row" id="topicsRow" aria-label="Page topics" role="list"></div>

    <!-- Overview -->
    <section class="summary-section" aria-labelledby="label-overview">
      <h2 class="section-label" id="label-overview">Overview</h2>
      <p class="summary-text" id="summaryText"></p>
    </section>

    <!-- Key Points -->
    <section class="summary-section" aria-labelledby="label-keypoints">
      <h2 class="section-label" id="label-keypoints">Key Points</h2>
      <ul class="bullets-list" id="bulletsList" aria-label="Key points"></ul>
    </section>

    <!-- Insights -->
    <section class="summary-section" aria-labelledby="label-insights">
      <h2 class="section-label" id="label-insights">Insights</h2>
      <div class="insights-grid" id="insightsGrid" aria-label="Key insights"></div>
    </section>

  </div><!-- /summary-panel -->
</main>

<!-- ╔══ ACTION BAR ════════════════════════════════════════════════════════════╗ -->
<footer class="action-bar" role="contentinfo">

  <!-- Mode selector: Brief / Standard / Detailed -->
  <div class="mode-selector" role="group" aria-label="Summary length">
    <button class="mode-btn" data-mode="brief" aria-pressed="false">Brief</button>
    <button class="mode-btn active" data-mode="standard" aria-pressed="true">Standard</button>
    <button class="mode-btn" data-mode="detailed" aria-pressed="false">Detailed</button>
  </div>

  <!-- Primary + secondary actions -->
  <div class="actions-row">
    <button class="btn btn-primary" id="summarizeBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
      </svg>
      Summarize Page
    </button>

    <div class="secondary-actions" id="secondaryActions" aria-label="Summary actions">
      <!-- Highlight -->
      <button class="icon-btn" id="highlightBtn"
              aria-label="Highlight key phrases on page"
              aria-pressed="false"
              title="Highlight key phrases">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>

      <!-- Copy -->
      <button class="icon-btn" id="copyBtn"
              aria-label="Copy summary to clipboard"
              title="Copy summary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
      </button>

      <!-- Clear -->
      <button class="icon-btn" id="clearBtn"
              aria-label="Clear summary"
              title="Clear">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6M14 11v6M9 6V4h6v2"/>
        </svg>
      </button>
    </div>
  </div>

</footer>

<script src="src/popup.js"></script>
</body>
</html>
